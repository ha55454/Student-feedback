apiVersion: apps/v1
kind: Deployment

metadata:
  name: feedback-app

spec:
  replicas: 1

  selector:
    matchLabels:
      app: feedback-app

  template:
    metadata:
      labels:
        app: feedback-app

    spec:
      containers:
      - name: feedback-app

        image: husna615/student-feedback-app

        ports:
        - containerPort: 5000
---
apiVersion: v1
kind: Service

metadata:
  name: feedback-service

spec:
  type: NodePort

  selector:
    app: feedback-app

  ports:
  - port: 5000
    targetPort: 5000
    nodePort: 30080
